server:
  port: 8080

spring:
  application:
    name: personal-kline-assistant
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:quant_kline}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 2s
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

llm:
  daily-stock-analysis:
    enabled: true
    base-url: http://localhost:8000
    risk-analysis-path: /api/external/kline-risk-analysis
    fallback-analysis-path: /api/v1/analysis/analyze
    connect-timeout-seconds: 5
    read-timeout-seconds: 90
    cache-enabled: true

market-data:
  engine:
    enabled: true
    host: 127.0.0.1
    port: 19090
    python-command: python3
    adata-home: ./adata-main
    startup-timeout-seconds: 20
    request-timeout-seconds: 60
  kline-cache:
    enabled: true
    key-prefix: personal-kline:kline:chart
    historical-ttl-hours: 168
    live-ttl-minutes: 15

signal:
  rule:
    stock-buy-score-threshold: 75
    etf-buy-score-threshold: 70
    etf-rsi-min: 42
    etf-rsi-max: 72
    etf-allow-partial-ma-confirmation: true
